# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    # Note that the session will be started ONLY if you read or write from it.
    session: true

    # Force traditional session-based CSRF protection instead of stateless (double-submit cookies) 
    # which fails over local HTTP
    csrf_protection:
        stateless_token_ids: []

    #esi: true
    #fragments: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
